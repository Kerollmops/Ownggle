<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ownggle - Your own search engine</title>
    <link href="assets/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB">
    <link href="assets/css/bootstrap-icons.min.css"
        integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
          rel="stylesheet">
    <style>
      mark {
        background: transparent;
        font-weight: 700;
        color: inherit;
        padding: 0;
      }

      @media (min-width: 768px) {
        #results { margin-left: 3.2em; }
      }

      .result-item {
        max-width: 46rem;
        padding: 0.75rem 0;
      }

      .result-item + .result-item {
          margin-top: 10px;
      }

      .result-breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.375rem;
        font-size: 0.78rem;
        margin-bottom: 0.15rem;
        min-width: 0;
      }

      .result-favicon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        border-radius: 2px;
      }

      .result-breadcrumb-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .result-title {
        font-size: 1.15rem;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .result-title:hover { text-decoration: underline !important; }

      .result-snippet {
        font-size: 0.875rem;
        line-height: 1.57;
        margin-top: 0.2rem;
      }

      .engine-cards { max-width: 46rem; }
    </style>
  </head>
  <body>

    <!-- ── Navbar ──────────────────────────────────────────────────────── -->
    <nav class="navbar border-bottom ps-3 ps-md-5 pe-3 py-2">
      <div class="d-flex align-items-center gap-3 w-100">
        <span class="flex-shrink-0" style="font-size:1.75rem;line-height:1;">🦀</span>
        <input type="search" id="inputQuery"
               class="form-control form-control-lg flex-grow-1 rounded-4 shadow-sm"
               style="max-width:42rem;"
               placeholder="Search your history…"
               autofocus>
        <button class="flex-shrink-0 btn btn-link text-secondary p-0"
                data-bs-toggle="modal" data-bs-target="#settingsModal"
                title="Settings">
          <i class="bi bi-gear-fill fs-5"></i>
        </button>
      </div>
    </nav>

    <!-- ── Results ─────────────────────────────────────────────────────── -->
    <div class="ps-3 pe-3 ps-md-5 pt-2">
      <div id="results"></div>
    </div>

    <!-- ── Settings modal ─────────────────────────────────────────────── -->
    <div class="modal fade" id="settingsModal" tabindex="-1"
         aria-labelledby="settingsModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="settingsModalLabel">
              <i class="bi bi-gear-fill me-2"></i>Meilisearch settings
            </h5>
            <button type="button" class="btn-close"
                    data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="settingUrl" class="form-label">Instance URL</label>
              <input type="url" id="settingUrl" class="form-control"
                     placeholder="http://localhost:7700">
              <div class="form-text">
                The URL of your Meilisearch instance.
              </div>
            </div>
            <div class="mb-3">
              <label for="settingKey" class="form-label">Search API Key</label>
              <input type="password" id="settingKey" class="form-control"
                     autocomplete="off">
              <div class="form-text">
                A key with search-only permissions. Found in your Meilisearch dashboard.
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary"
                    data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary"
                    id="btnSaveSettings">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI">
    </script>
    <script src="assets/js/moment-with-locales.min.js"
            integrity="sha384-Jx7nF8Lr+lkOLpB9WqQqk6OK83W8P87BGQxdNEFvHM5SEiItXH87Ednyl0soQZs8">
    </script>

    <script>
      // Set theme to the user's preferred color scheme
      function updateTheme() {
        const colorMode = window.matchMedia("(prefers-color-scheme: dark)").matches ?
          "dark" :
          "light";
        document.querySelector("html").setAttribute("data-bs-theme", colorMode);
      }

      // Set theme on load
      updateTheme()

      // Update theme when the preferred scheme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTheme)
    </script>

    <script type="module">
      import { MeiliSearch } from 'https://esm.sh/meilisearch@0.48.0';

      // ── Settings (localStorage) ──────────────────────────────────────────

      const LS_URL = 'meili_url';
      const LS_KEY = 'meili_api_key';

      const getSettings = () => ({
        url:    localStorage.getItem(LS_URL)  ?? 'http://localhost:7700',
        apiKey: localStorage.getItem(LS_KEY)  ?? '',
      });

      const makeClient = () => {
        const { url, apiKey } = getSettings();
        return new MeiliSearch({ host: url, apiKey });
      };

      let client       = makeClient();
      // historyIndex is kept for the fallback title lookup (see search()).
      // page-chunks is queried via client.multiSearch(), not a standalone handle.
      let historyIndex = client.index('browsing-history');

      const settingsModalEl = document.getElementById('settingsModal');
      const settingUrlEl    = document.getElementById('settingUrl');
      const settingKeyEl    = document.getElementById('settingKey');

      // Pre-fill the modal with current values every time it opens.
      settingsModalEl.addEventListener('show.bs.modal', () => {
        const { url, apiKey } = getSettings();
        settingUrlEl.value = url;
        settingKeyEl.value = apiKey;
      });

      document.getElementById('btnSaveSettings').addEventListener('click', () => {
        localStorage.setItem(LS_URL, settingUrlEl.value.trim() || 'http://localhost:7700');
        localStorage.setItem(LS_KEY, settingKeyEl.value.trim());
        // Rebuild the client from the new settings.
        client       = makeClient();
        historyIndex = client.index('browsing-history');
        bootstrap.Modal.getInstance(settingsModalEl).hide();
        // Refresh results if there is an active query.
        const q = inputEl.value.trim();
        if (q) search(q);
      });

      // ── DOM refs ──────────────────────────────────────────────────────────

      const inputEl   = document.getElementById('inputQuery');
      const resultsEl = document.getElementById('results');

      // ── Helpers ───────────────────────────────────────────────────────────

      function escapeHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // Escapes the whole snippet then restores only the <mark> tags that
      // Meilisearch injects — no other HTML can sneak through.
      function renderSnippet(raw) {
        return escapeHtml(raw)
          .replace(/&lt;mark&gt;/g, '<mark>')
          .replace(/&lt;\/mark&gt;/g, '</mark>');
      }

      function getHostname(url) {
        try { return new URL(url).hostname; } catch { return null; }
      }

      function cleanUrl(url) {
        try {
          const { hostname, pathname } = new URL(url);
          const path = pathname.replace(/\/$/, '');
          return path ? `${hostname}${path}` : hostname;
        } catch { return url; }
      }

      function debounce(fn, ms) {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
      }

      // Set moment's locale to match the browser so month names, relative
      // phrasing, etc. are all rendered in the user's language.
      moment.locale(navigator.language);

      // lastVisitTime from chrome.history is ms since the Unix epoch (1970).
      // Chrome's raw SQLite stores µs since 1601, but the extension API
      // normalises this before exposing it — no manual conversion needed.
      function formatDate(ms) {
        const m = moment(ms);
        // < 30 days → relative phrasing:  "2 hours ago", "yesterday", "3 weeks ago"
        // ≥ 30 days → locale month + year: "March 2024", "mars 2024"
        return moment().diff(m, 'days') < 30 ? m.fromNow() : m.format('MMMM YYYY');
      }

      function visitMetaHtml(visitCount, lastVisitTime) {
        const parts = [];
        if (visitCount     != null) parts.push(`Visited ${visitCount.toLocaleString()} time${visitCount !== 1 ? 's' : ''}`);
        if (lastVisitTime  != null) parts.push(`most recently ${formatDate(lastVisitTime)}`);
        return parts.length
          ? `<small class="text-body-secondary mb-0">${parts.join(', ')}</small>`
          : '';
      }

      // Returns the two search-engine cards for a given query string.
      // Shown after the 3rd result (or at the end / on no results).
      // Never called when the query is empty.
      function engineCardsHtml(query) {
        const q = encodeURIComponent(query);
        return `
          <div class="engine-cards my-3">
            <div class="row g-3">
              <div class="col-6">
                <a href="https://duckduckgo.com/?q=${q}"
                   target="_blank" rel="noopener noreferrer"
                   class="card border-0 text-decoration-none h-100 overflow-hidden">
                  <img class="card-img-top object-fit-contain p-4"
                       src="DuckDuckGo-Logo.png"
                       alt="DuckDuckGo"
                       style="background:#e37151;height:130px;">
                  <div class="card-footer border-0 text-center fw-semibold text-white py-2"
                       style="background:#e37151;">
                    Search on DuckDuckGo
                  </div>
                </a>
              </div>
              <div class="col-6">
                <a href="https://www.google.com/search?q=${q}"
                   target="_blank" rel="noopener noreferrer"
                   class="card border-0 text-decoration-none h-100 overflow-hidden">
                  <img class="card-img-top object-fit-contain p-4"
                       src="Google-Logo.png"
                       alt="Google"
                       style="background:#0057e7;height:130px;">
                  <div class="card-footer border-0 text-center fw-semibold text-white py-2"
                       style="background:#0057e7;">
                    Search on Google
                  </div>
                </a>
              </div>
            </div>
          </div>`;
      }

      // ── Search ────────────────────────────────────────────────────────────

      function resultItemHtml({ url, title, snippet, visitCount, lastVisitTime }) {
        // chrome.history.onVisited fires before the page title is known, so
        // Chrome sometimes writes the raw URL as the title. Detect that and
        // fall back to the cleaned URL so we never render "https://…" as a title.
        const displayTitle = title && !/^https?:\/\//i.test(title)
          ? title
          : cleanUrl(url) || 'Untitled';

        const hostname = getHostname(url);
        const parent   = hostname?.split('.').slice(1).join('.');
        const fallbackSrc = parent?.includes('.')
          ? `https://icons.duckduckgo.com/ip3/${escapeHtml(parent)}.ico`
          : '';
        const faviconHtml = hostname ? `<img
          class="result-favicon"
          src="https://icons.duckduckgo.com/ip3/${escapeHtml(hostname)}.ico"
          data-fallback="${fallbackSrc}"
          onerror="if(this.dataset.fallback){this.src=this.dataset.fallback;this.dataset.fallback=''}else{this.style.display='none'}"
          alt="">` : '';
        return `
          <div class="result-item">
            <div class="result-breadcrumb">
              ${faviconHtml}
              <span class="result-breadcrumb-text">${escapeHtml(cleanUrl(url))}</span>
            </div>
            <a class="result-title text-decoration-none text-break"
               href="${escapeHtml(url)}"
               target="_blank"
               rel="noopener noreferrer">${escapeHtml(displayTitle)}</a>
            ${snippet ? `<p class="result-snippet mb-0">${renderSnippet(snippet)}</p>` : ''}
            ${visitMetaHtml(visitCount, lastVisitTime)}
          </div>`;
      }

      async function search(query) {
        resultsEl.innerHTML = '';
        if (!query.trim()) return;

        const cards = engineCardsHtml(query);

        try {
          // Single federated multi-search across both indices in one round-trip.
          // browsing-history matches on title/hostname; page-chunks matches on
          // full page content and gets a 1.2× weight boost.
          // The response is a single merged hit list ordered by weighted score.
          const { hits } = await client.multiSearch({
            federation: { limit: 20 },
            queries: [
              {
                indexUid: 'browsing-history',
                q: query,
                distinct: 'hostname',
                attributesToRetrieve: ['id', 'title', 'url', 'lastVisitTime', 'visitCount'],
              },
              {
                indexUid: 'page-chunks',
                q: query,
                distinct: 'historyId',
                attributesToHighlight: ['content'],
                attributesToCrop: ['content'],
                cropLength: 25,
                highlightPreTag: '<mark>',
                highlightPostTag: '</mark>',
                attributesToRetrieve: ['historyId', 'url'],
                federationOptions: { weight: 1.2 },
              },
            ],
          });

          if (!hits.length) {
            resultsEl.innerHTML = '<p class="text-muted mt-3">No results.</p>' + cards;
            return;
          }

          // Deduplicate and merge hits from both indices.
          //
          // The shared page key is:
          //   browsing-history hit  →  hit.id
          //   page-chunks hit       →  hit.historyId
          // (browsing-history.id === page-chunks.historyId by design)
          //
          // Map preserves insertion order == federated relevance order.
          // If the same page appears in both indices, the first (higher-scored)
          // hit claims the slot; the second hit only fills in missing fields.
          const pageMap = new Map(); // pageKey → { url, title, snippet }

          for (const hit of hits) {
            const isHistory = hit._federation.indexUid === 'browsing-history';
            const pageKey   = isHistory ? hit.id : hit.historyId;

            if (!pageMap.has(pageKey)) {
              pageMap.set(pageKey, {
                url:           hit.url                    ?? '',
                title:         isHistory ? (hit.title          ?? null) : null,
                snippet:       isHistory ? null : (hit._formatted?.content ?? null),
                visitCount:    isHistory ? (hit.visitCount     ?? null) : null,
                lastVisitTime: isHistory ? (hit.lastVisitTime  ?? null) : null,
              });
            } else {
              // Merge: later hit for the same page fills in what is still null.
              const entry = pageMap.get(pageKey);
              if (isHistory && entry.title         === null) entry.title         = hit.title          ?? null;
              if (isHistory && entry.visitCount    === null) entry.visitCount    = hit.visitCount     ?? null;
              if (isHistory && entry.lastVisitTime === null) entry.lastVisitTime = hit.lastVisitTime  ?? null;
              if (!isHistory && entry.snippet      === null) entry.snippet       = hit._formatted?.content ?? null;
            }
          }

          // Fetch titles for page-chunks-only results (no browsing-history hit
          // appeared in the federated results for that page).
          const missingIds = [...pageMap.entries()]
            .filter(([, v]) => v.title === null)
            .map(([k]) => k);

          if (missingIds.length) {
            const idList = missingIds.map(id => `"${id}"`).join(', ');
            const { hits: titleHits } = await historyIndex.search('', {
              filter: `id IN [${idList}]`,
              limit:  missingIds.length,
              attributesToRetrieve: ['id', 'title', 'lastVisitTime', 'visitCount'],
            });
            for (const p of titleHits) {
              const entry = pageMap.get(p.id);
              if (entry) {
                entry.title         = p.title         ?? null;
                entry.visitCount    = p.visitCount    ?? null;
                entry.lastVisitTime = p.lastVisitTime ?? null;
              }
            }
          }

          // Render in relevance order and splice in the engine cards.
          const resultItems = [...pageMap.values()].map(resultItemHtml);
          resultItems.splice(Math.min(3, resultItems.length), 0, cards);
          resultsEl.innerHTML = resultItems.join('');

        } catch (err) {
          resultsEl.innerHTML =
            `<p class="text-danger mt-3">Search failed: ${escapeHtml(err.message)}</p>` + cards;
        }
      }

      // ── URL query parameter (?q=…) ────────────────────────────────────────
      // Enables using this page as a browser search engine:
      //   https://yourname.github.io/path/to/webview/?q=%s

      const initialQuery = new URLSearchParams(location.search).get('q') ?? '';
      if (initialQuery) {
        inputEl.value = initialQuery;
        search(initialQuery);
      }

      inputEl.addEventListener('input', debounce(e => search(e.target.value), 25));
    </script>
  </body>
</html>
