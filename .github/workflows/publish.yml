name: Build and Upload to gh-pages

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3

      - name: Purge the CSS
        run: |
          npm install -g purgecss
          purgecss --content 'webview/*.html' \
                   --css 'webview/assets/css/bootstrap.min.css' \
                   --css 'webview/assets/css/bootstrap-icons.min.css' \
                   --output 'webview/assets/css'

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webview
          cname: own.kerollmops.com
          force_orphan: true
